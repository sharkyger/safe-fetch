name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check
      - name: Format check
        run: ruff format --check
      - name: Test
        run: pytest -v

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy
      - name: bandit
        run: bandit -r src/ docker/ -ll
      - name: pip-audit
        # --skip-editable so the local `pip install -e .` install isn't
        # audited (we care about third-party deps only — Dependabot tracks
        # them). We don't add --strict because it would promote the skip
        # warning to a hard failure.
        run: pip-audit --skip-editable

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: shellcheck hooks + scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck src/safe_fetch/data/hooks/*.sh docker/build.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Build safe-fetch image
        run: docker build -t safe-fetch:latest -f docker/Dockerfile .
      - name: Smoke check the entrypoint
        run: |
          # Image should at minimum print its usage on bad invocation
          docker run --rm safe-fetch:latest 2>&1 | grep -q "Usage" || (echo "image entrypoint smoke failed"; exit 1)
